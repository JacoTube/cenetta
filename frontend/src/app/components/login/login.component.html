<section class="card narrow">
  <h1>Accedi a Cenetta</h1>
  <p class="muted small">Organizza cene condivise senza dimenticare il guanciale.</p>

  <label>Username
    <input type="text" [(ngModel)]="username" name="username" autocomplete="username">
  </label>

  <label>Password
    <input type="password" [(ngModel)]="password" name="password"
           autocomplete="current-password" (keyup.enter)="submit()">
  </label>

  <p class="msg error" *ngIf="error">{{ error }}</p>

  <button class="primary" (click)="submit()">Entra</button>

  <p class="muted small" style="margin-top:1rem">
    Non hai un account? <a routerLink="/registrazione">Registrati</a>
  </p>
</section>
